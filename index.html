
<!DOCTYPE html>
<html lang="en" dir="ltr">
	<head>
		<meta http-equiv="X-UA-Compatible" content="IE=edge">
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, minimum-scale=1, initial-scale=1, shrink-to-fit=no">

		<!-- Use Google Fonts for now; IRL would self-host -->

		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;500;600&family=Source+Serif+4:wght@900&display=swap" rel="stylesheet">

		<!-- NOTES:
				Using Source Serif 4 instead of Source Serif Pro; the Source Serif Pro font used in the Figma design was not available from Google Fonts, so this is a substitution. IRL, I'd likely get the file from another source and self-host the font.
			 	In a real-world project, custom fonts would be defined in tailwind.config.js. Just keeping it simple here.
			 	Also implemented some custom CSS to handle the browser's normal scrollbar.
		-->

		<style>
			.font-source-serif {font-family: 'Source Serif 4', serif}
			.font-bebas-neue {font-family: 'Bebas Neue', sans-serif}
			.font-poppins {font-family: 'Poppins', sans-serif}

			#desktop-carousel::-webkit-scrollbar {display: none}
			#desktop-carousel {scrollbar-width: none}

			#thumb {
				height: 3px;
				position: absolute;
				top: 50%;
				transform: translateY(-50%);
				cursor: grab
			}
			#thumb:active {cursor: grabbing}

			.card a:after {
				content: '';
				position: absolute;
				top: 0;
				bottom: 0;
				left: 0;
				right: 0
			}

			@media (prefers-reduced-motion: no-preference) {
				#thumb {transition: height 0.2s ease}
			}
		</style>

		<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

		<title>Best Sellers - Technical Assessment</title>
	</head>
	<body>
		<main>
			<div class="w-full md:max-w-[1920px] md:mx-auto pt-9 pb-9 px-6 md:pt-20 md:pb-25 md:px-32 flex flex-col gap-3 md:gap-9">

				<!--Section header -->
				<div class="flex items-center justify-center md:justify-between mb-6">
					<h2 class="font-bold md:font-black text-[28px] md:text-[40px] leading-[1.25] md:leading-[1.2] tracking-[-1px] text-center md:text-left text-[#231F20] font-source-serif">Best Sellers</h2>
					<a href="#" class="hidden md:flex items-center gap-1 font-semibold text-[14px] leading-[1.4] tracking-[0.03em] text-center text-[#5C553A] font-poppins border-b border-transparent hover:border-current motion-safe:transition-colors motion-safe:duration-300">Shop All Best Sellers &#8594;</a>
				</div>

				<!-- Horizontal-scroll desktop carousel -->
				<div class="hidden md:block">
					<div id="desktop-carousel" class="flex gap-5 overflow-x-auto pb-4 cursor-grab active:cursor-grabbing">
					  <!-- Product cards inserted dynamically here -->
					</div>

					<!-- Custom scrollbar -->
					<div id="scrollbar-track" class="mt-1 h-[3px] bg-gray-200 rounded-full relative overflow-visible">
					  <div id="thumb" class="absolute bg-gray-900 rounded-full" style="width:28%; left:0;"></div>
					</div>
				</div>

				<!-- Mobile Grid -->
				<div class="md:hidden">
    				<div id="mobile-grid" class="grid grid-cols-2 gap-3"></div>
					<button id="showMoreBtn" class="mt-5 w-full rounded-[100px] py-4 px-6 bg-[#1C1D1D] font-poppins font-semibold text-[16px] leading-[1.4] tracking-[0.03em] text-center text-[#FFFFFA] hover:opacity-90 motion-safe:transition-opacity motion-safe:duration-300">Show More</button>
				</div>

			</div>
		</main>

		<script>
			const products = [
				{ name:"Outside Vibes T-Shirt Sunshine",        	price:"$104.95", bestseller:true,  save:null, rating:3.5, reviews:1234, img:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400&q=80", img2:"https://images.unsplash.com/photo-1484704849700-f032a568e944?w=400&q=80" },
				{ name:"Hike Bottle Outside Vibes Forest Green", 	price:"$104.95", bestseller:true,  save:10,   rating:5,   reviews:1234, img:"https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=400&q=80", img2:"https://images.unsplash.com/photo-1511499767150-a48a237f0083?w=400&q=80" },
				{ name:"Rest In Nature T-Shirt Charcoal",        	price:"$104.95", bestseller:true,  save:null, rating:4.5, reviews:1234, img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400&q=80", img2:"https://images.unsplash.com/photo-1608231387042-66d1773070a5?w=400&q=80" },
				{ name:"Outside Vibes Cap Forest Green",         	price:"$104.95", bestseller:true,  save:15,   rating:5,   reviews:1234, img:"https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400&q=80", img2:"https://images.unsplash.com/photo-1585386959984-a4155224a1ad?w=400&q=80" },
				{ name:"Rest In Nature T-Shirt Charcoal",        	price:"$104.95", bestseller:true,  save:null, rating:4,   reviews:1234, img:"https://images.unsplash.com/photo-1585386959984-a4155224a1ad?w=400&q=80", img2:"https://images.unsplash.com/photo-1556306535-0f09a537f0a3?w=400&q=80" },
				{ name:"Weekend Linen Shirt Ivory",              	price:"$89.95",  bestseller:false, save:20,   rating:4.5, reviews:876,  img:"https://images.unsplash.com/photo-1598033129183-c4f50c736f10?w=400&q=80", img2:"https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=400&q=80" },
				{ name:"Classic Canvas Tote Natural",            	price:"$59.95",  bestseller:true,  save:null, rating:5,   reviews:2341, img:"https://images.unsplash.com/photo-1544816155-12df9643f363?w=400&q=80", img2:"https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=400&q=80" },
				{ name:"Matte Ceramic Pour-Over Set",            	price:"$124.95", bestseller:false, save:10,   rating:4,   reviews:543,  img:"https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=400&q=80", img2:"https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=400&q=80" },
				{ name:"Wool Beanie Storm Grey",                 	price:"$49.95",  bestseller:true,  save:null, rating:4.5, reviews:1102, img:"https://images.unsplash.com/photo-1576871337632-b9aef4c17ab9?w=400&q=80", img2:"https://images.unsplash.com/photo-1510598969022-c4c6c5d05769?w=400&q=80" },
				{ name:"Leather Bifold Wallet Tan",              	price:"$79.95",  bestseller:true,  save:5,    rating:4,   reviews:987,  img:"https://images.unsplash.com/photo-1627123424574-724758594e93?w=400&q=80", img2:"https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=400&q=80" }
			];

			// SVG icons for star ratings
			function starsHTML(rating) {
				return Array.from({ length: 5 }, (_, i) => {
					const filled = rating >= i + 1 || rating >= i + 0.5;
					return `<svg width="12" height="12" class="md:w-3 md:h-3 w-[9px] h-[9px]" viewBox="0 0 12 12" aria-hidden="true" fill="${filled ? '#231F20' : '#CFCFCF'}" xmlns="http://www.w3.org/2000/svg">
					<path d="M6 0L7.63 4.17L12 4.51L8.82 7.24L9.88 11.49L6 9.1L2.12 11.49L3.18 7.24L0 4.51L4.37 4.17L6 0Z"/>
					</svg>`;
				}).join('');
			}

			// Create product cards
			function buildCard(p) {
				const card = document.createElement('div');
				card.className = 'card relative group flex flex-col w-full md:w-[355px] flex-shrink-0';
				card.innerHTML = `
					<div class="relative rounded-[10px] overflow-hidden aspect-square">
						<img src="${p.img}" alt="${p.name}" class="absolute inset-0 w-full h-full object-cover opacity-100 group-hover:opacity-0 motion-safe:transition-opacity motion-safe:duration-300">
						<img src="${p.img2}" alt="${p.name}" class="absolute inset-0 w-full h-full object-cover opacity-0 group-hover:opacity-100 motion-safe:transition-opacity motion-safe:duration-300">
						<div class="absolute top-2 left-2 right-2 flex justify-between items-start pointer-events-none">
							${p.bestseller ? `<span class="bg-white border border-black rounded-[100px] py-1 px-2 font-bebas-neue font-normal text-[10px] leading-none tracking-[0.06em] text-center text-black">Best Seller</span>` : '<span></span>'}
							${p.save ? `<span class="bg-[#5C7962] border border-black rounded-[100px] py-1 px-2 font-bebas-neue font-normal text-[10px] leading-none tracking-[0.06em] text-center text-[#FFFFFA]">Save ${p.save}%</span>` : '<span></span>'}
						</div>
					</div>
					<div class="flex flex-col gap-y-2 mt-5 mb-5">
						<p class="font-bebas-neue font-normal text-[16px] md:text-[18px] leading-none tracking-[0.03em] uppercase text-[#1C1D1D]"><a href="#">${p.name}</a></p>
						<div class="flex items-center gap-x-1 py-1">
							<div class="flex items-center gap-x-0.5" aria-label="${p.rating} stars">${starsHTML(p.rating)}</div>
							<span class="font-poppins font-normal text-[11px] md:text-[12px] leading-none text-[#707070]">${p.reviews.toLocaleString()} Reviews</span>
						</div>
						<p class="font-poppins font-medium text-[16px] leading-none uppercase text-[#1C1D1D]">${p.price}</p>
					</div>
				`;
				return card;
			}

			const desktopSlider = document.getElementById('desktop-carousel');
			const mobileGrid = document.getElementById('mobile-grid');

			products.forEach((p, i) => {
				desktopSlider.appendChild(buildCard(p));
				const mCard = buildCard(p);
				if (i >= 4) mCard.classList.add('hidden');
				mobileGrid.appendChild(mCard);
			});

			// Scrollbar 

			const scrollbarTrack = document.getElementById('scrollbar-track');
			const thumb = document.getElementById('thumb');

			// Recalculate thumb width and position based on scroll state
			function updateThumb() {
				const ratio = desktopSlider.clientWidth / desktopSlider.scrollWidth;
				const thumbWidth = Math.max(ratio * scrollbarTrack.clientWidth, 40); // 40px minimum
				const maxScrollLeft = desktopSlider.scrollWidth - desktopSlider.clientWidth;
				const maxThumbLeft = scrollbarTrack.clientWidth - thumbWidth;
				const pct = maxScrollLeft > 0 ? desktopSlider.scrollLeft / maxScrollLeft : 0;
				thumb.style.width = thumbWidth + 'px';
				thumb.style.left = (pct * maxThumbLeft).toFixed(1) + 'px';
			}

			// Update thumb on scroll
			desktopSlider.addEventListener('scroll', updateThumb);

			// Update thumb on resize (e.g. window resize changes container width)
			window.addEventListener('resize', updateThumb);

			// Run once on load to set initial thumb size/position
			window.addEventListener('load', updateThumb);

			// Thumb hover height
			let isThumbDragging = false;

			thumb.addEventListener('mouseenter', () => thumb.style.height = '6px');
			thumb.addEventListener('mouseleave', () => { if (!isThumbDragging) thumb.style.height = ''; });

			// Thumb drag — moves the scrollbar thumb and syncs to carousel scroll position
			let thumbStartX, thumbStartLeft;

			thumb.addEventListener('mousedown', e => {
				isThumbDragging = true;
				thumbStartX = e.pageX;
				thumbStartLeft = thumb.offsetLeft;
				thumb.style.height = '6px';
				e.stopPropagation(); // prevent triggering carousel drag simultaneously
				e.preventDefault();
			});

			document.addEventListener('mousemove', e => {
				if (!isThumbDragging) return;
				const dx = e.pageX - thumbStartX;
				const maxThumbLeft = scrollbarTrack.clientWidth - thumb.offsetWidth;
				const newLeft = Math.min(Math.max(thumbStartLeft + dx, 0), maxThumbLeft);
				const pct = maxThumbLeft > 0 ? newLeft / maxThumbLeft : 0;
				// Update carousel scroll position to match thumb
				desktopSlider.scrollLeft = pct * (desktopSlider.scrollWidth - desktopSlider.clientWidth);
			});

			document.addEventListener('mouseup', () => {
				if (isThumbDragging) {
					isThumbDragging = false;
					thumb.style.height = '';
				}
			});

			// Carousel click and drag

			let isSliderDragging = false, startX, sl;

			desktopSlider.addEventListener('mousedown', e => {
				isSliderDragging = true;
				startX = e.pageX - desktopSlider.offsetLeft;
				sl = desktopSlider.scrollLeft;
			});

			document.addEventListener('mouseup', () => isSliderDragging = false);

			desktopSlider.addEventListener('mousemove', e => {
				if (!isSliderDragging) return;
				e.preventDefault();
				desktopSlider.scrollLeft = sl - (e.pageX - desktopSlider.offsetLeft - startX) * 1.2;
			});

			// Expand mobile grid and remove "Show More" button when button is clicked
			document.getElementById('showMoreBtn').addEventListener('click', function() {
				const cards = mobileGrid.querySelectorAll(':scope > div');
				cards.forEach((c, i) => { if (i >= 4) c.classList.remove('hidden'); });
				this.remove();
			});
		</script>
	</body>
</html>
